<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NATO Phonetic Trainer</title>
    <meta name="description" content="Learn and practice the NATO phonetic alphabet for tech support calls. Live converter, quizzes, call simulator, and more.">
    <meta name="theme-color" content="#0a0f0c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00ff88;
            --green-dim: #00cc66;
            --green-bg: rgba(0,255,136,0.04);
            --green-bg2: rgba(0,255,136,0.08);
            --green-border: rgba(0,255,136,0.15);
            --green-glow: rgba(0,255,136,0.25);
            --amber: #ffb400;
            --amber-bg: rgba(255,180,0,0.08);
            --amber-border: rgba(255,180,0,0.3);
            --red: #ff4455;
            --red-bg: rgba(255,68,85,0.08);
            --red-border: rgba(255,68,85,0.2);
            --cyan: #00d4ff;
            --bg: #0a0f0c;
            --bg2: rgba(0,0,0,0.25);
            --text: #c8e0d0;
            --text-dim: #667788;
            --text-dimmer: #445566;
            --text-dimmest: #334444;
            --border-dim: rgba(255,255,255,0.06);
            --font: 'Share Tech Mono', 'Courier New', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: linear-gradient(170deg, #0a0f0c 0%, #0d1410 40%, #080d0a 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Scanlines */
        body::after {
            content: '';
            position: fixed; inset: 0;
            pointer-events: none; z-index: 9999;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.15); border-radius: 3px; }

        .app { max-width: 720px; margin: 0 auto; padding: 28px 16px 40px; }

        /* Header */
        .header { text-align: center; margin-bottom: 32px; }
        .header-sub { font-size: 0.65rem; letter-spacing: 0.35em; color: var(--text-dimmer); margin-bottom: 6px; }
        .header h1 { font-size: 1.7rem; font-weight: 700; color: var(--green); letter-spacing: 0.08em; text-shadow: 0 0 30px var(--green-glow), 0 0 60px rgba(0,255,136,0.08); }
        .header-abc { font-size: 0.72rem; letter-spacing: 0.2em; color: var(--text-dim); margin-top: 5px; }

        /* Stats bar */
        .stats-bar {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;
            padding: 10px 16px; background: var(--bg2); border: 1px solid var(--border-dim); border-radius: 2px;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--text-dimmer); }
        .stat-val { font-size: 1rem; font-weight: 700; }

        /* Tabs */
        .tabs { display: flex; gap: 6px; margin-bottom: 24px; justify-content: center; flex-wrap: wrap; }
        .tab-btn {
            background: transparent; border: 1px solid var(--border-dim);
            color: var(--text-dim); padding: 9px 14px; font-family: var(--font);
            font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s; border-radius: 2px; white-space: nowrap;
        }
        .tab-btn.active { background: rgba(0,255,136,0.1); border-color: var(--green); color: var(--green); }
        .tab-btn:hover:not(.active) { border-color: rgba(0,255,136,0.3); color: #88aa99; }

        /* Content panel */
        .panel { background: var(--bg2); border: 1px solid rgba(0,255,136,0.06); padding: 22px 18px; border-radius: 2px; }

        /* Inputs */
        .input {
            background: rgba(0,255,136,0.03); border: 1px solid rgba(0,255,136,0.2);
            padding: 12px 14px; color: #e0ffe8; font-family: var(--font);
            font-size: 0.95rem; outline: none; border-radius: 2px; width: 100%;
        }
        .input::placeholder { color: rgba(102,119,136,0.6); }
        .input:focus { border-color: rgba(0,255,136,0.45); }
        textarea.input { resize: vertical; }

        /* Buttons */
        .btn {
            background: var(--green-bg2); border: 1px solid var(--green-border);
            color: var(--green); padding: 10px 20px; font-family: var(--font);
            font-size: 0.82rem; letter-spacing: 0.05em; cursor: pointer;
            border-radius: 2px; transition: all 0.2s; white-space: nowrap;
        }
        .btn:hover { background: rgba(0,255,136,0.15); border-color: var(--green); }
        .btn-amber { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber); }
        .btn-amber:hover { background: rgba(255,180,0,0.15); }
        .btn-dim { background: transparent; border-color: var(--border-dim); color: var(--text-dim); }
        .btn-dim:hover { border-color: rgba(255,255,255,0.15); }
        .btn-red { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }

        /* Grid for reference */
        .ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 7px; }
        .ref-card {
            background: var(--green-bg); border: 1px solid rgba(255,255,255,0.04);
            padding: 12px 10px; display: flex; align-items: baseline; gap: 10px;
            transition: all 0.2s; cursor: pointer; border-radius: 2px;
        }
        .ref-card:hover { background: var(--green-bg2); border-color: var(--green-border); }
        .ref-card .letter { color: var(--green); font-size: 1.25rem; font-weight: 700; width: 22px; text-align: center; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .ref-card .word { color: #99bbaa; font-size: 0.82rem; letter-spacing: 0.03em; }

        /* Quiz options grid */
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
        .quiz-opt {
            background: var(--green-bg); border: 1px solid var(--green-border);
            color: #99ccaa; padding: 15px 12px; font-family: var(--font);
            font-size: 0.92rem; font-weight: 600; cursor: pointer;
            transition: all 0.15s; border-radius: 2px; text-align: center;
        }
        .quiz-opt:hover { background: rgba(0,255,136,0.12); }
        .quiz-opt.correct { background: rgba(0,255,136,0.2); border-color: var(--green); color: var(--green); }
        .quiz-opt.wrong { background: rgba(255,68,85,0.15); border-color: var(--red); color: var(--red); }
        .quiz-opt.dimmed { background: rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.03); color: #334455; }

        /* Spell progress dots */
        .spell-chars { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
        .spell-char {
            width: 36px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; border-radius: 2px; transition: all 0.3s;
        }
        .spell-char.done { background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.08); color: #336644; }
        .spell-char.active { background: rgba(0,255,136,0.15); border: 1px solid var(--green); color: var(--green); text-shadow: 0 0 12px rgba(0,255,136,0.4); }
        .spell-char.pending { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); color: #334455; }

        /* Results list */
        .result-row {
            display: flex; align-items: center; gap: 10px; padding: 9px 12px;
            font-size: 0.83rem; border-radius: 2px; margin-bottom: 4px;
        }
        .result-row.ok { background: rgba(0,255,136,0.04); border: 1px solid rgba(0,255,136,0.1); }
        .result-row.fail { background: rgba(255,68,85,0.05); border: 1px solid rgba(255,68,85,0.12); }

        /* Converter output */
        .convert-output {
            display: flex; flex-wrap: wrap; gap: 6px 16px; padding: 18px;
            background: rgba(0,255,136,0.02); border: 1px solid rgba(0,255,136,0.08); border-radius: 2px;
        }
        .convert-pair .c-letter { color: var(--green); font-size: 1.05rem; font-weight: 700; text-shadow: 0 0 8px rgba(0,255,136,0.3); }
        .convert-pair .c-word { color: #88aa99; font-size: 0.88rem; margin-left: 5px; }
        .convert-space { width: 100%; height: 6px; }

        /* Call simulator */
        .sim-display {
            text-align: center; padding: 24px; margin-bottom: 20px;
            background: rgba(0,255,136,0.02); border: 1px solid rgba(0,255,136,0.1); border-radius: 2px;
        }
        .sim-label { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 10px; }
        .sim-value { font-size: 1.6rem; font-weight: 700; color: var(--green); letter-spacing: 0.12em; text-shadow: 0 0 20px var(--green-glow); word-break: break-all; }
        .sim-timer { font-size: 2.2rem; font-weight: 700; margin: 12px 0; }

        /* Keyboard hints */
        .kbd { display: inline-block; padding: 2px 7px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; font-size: 0.7rem; color: var(--text-dim); margin-left: 4px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #161b22; padding: 10px 20px; border-radius: 4px;
            border-left: 3px solid var(--green); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            font-size: 0.8rem; z-index: 10000; opacity: 0; transition: all 0.3s;
            pointer-events: none; max-width: 90vw;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Mobile */
        @media (max-width: 600px) {
            .app { padding: 16px 10px 32px; }
            .header h1 { font-size: 1.3rem; }
            .tabs { gap: 4px; }
            .tab-btn { padding: 8px 10px; font-size: 0.7rem; }
            .panel { padding: 16px 12px; }
            .ref-grid { grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 5px; }
            .ref-card { padding: 10px 8px; }
            .quiz-grid { gap: 8px; }
            .quiz-opt { padding: 14px 10px; font-size: 0.85rem; }
            .spell-char { width: 30px; height: 34px; font-size: 1rem; }
            .sim-value { font-size: 1.2rem; }
            .stats-bar { gap: 12px; padding: 8px 10px; }
            .stat-val { font-size: 0.85rem; }
        }

        /* Fade in */
        .fade-in { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Speaker icon button */
        .speak-btn {
            background: none; border: none; color: var(--green); cursor: pointer;
            font-size: 1rem; padding: 4px; opacity: 0.6; transition: opacity 0.2s;
        }
        .speak-btn:hover { opacity: 1; }

        .flex-center { display: flex; justify-content: center; align-items: center; }
        .flex-wrap { display: flex; flex-wrap: wrap; }
        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }
        .mt-12 { margin-top: 12px; }
        .mt-20 { margin-top: 20px; }
        .mt-24 { margin-top: 24px; }
        .mb-12 { margin-bottom: 12px; }
        .mb-20 { margin-bottom: 20px; }
        .mb-24 { margin-bottom: 24px; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-sub">COMMS TRAINING SYSTEM</div>
        <h1>NATO PHONETIC</h1>
        <div class="header-abc">ALPHA BRAVO CHARLIE</div>
    </div>

    <!-- Persistent Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-label">SESSIONS</div>
            <div class="stat-val" style="color:var(--green)" id="stat-sessions">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">ACCURACY</div>
            <div class="stat-val" style="color:var(--amber)" id="stat-accuracy">—</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">BEST STREAK</div>
            <div class="stat-val" style="color:var(--red)" id="stat-streak">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">BEST TIME</div>
            <div class="stat-val" style="color:var(--cyan)" id="stat-besttime">—</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="convert">Live Convert</button>
        <button class="tab-btn" data-tab="reference">Reference</button>
        <button class="tab-btn" data-tab="spell">Spell Drill</button>
        <button class="tab-btn" data-tab="quiz">Speed Quiz</button>
        <button class="tab-btn" data-tab="sim">Call Sim</button>
        <button class="tab-btn" data-tab="timed">Timed</button>
    </div>

    <!-- Panels -->
    <div class="panel" id="panel-convert"></div>
    <div class="panel hidden" id="panel-reference"></div>
    <div class="panel hidden" id="panel-spell"></div>
    <div class="panel hidden" id="panel-quiz"></div>
    <div class="panel hidden" id="panel-sim"></div>
    <div class="panel hidden" id="panel-timed"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// NATO DATA
// ═══════════════════════════════════════════════
const NATO = {
    A:"Alpha",B:"Bravo",C:"Charlie",D:"Delta",E:"Echo",F:"Foxtrot",G:"Golf",
    H:"Hotel",I:"India",J:"Juliet",K:"Kilo",L:"Lima",M:"Mike",N:"November",
    O:"Oscar",P:"Papa",Q:"Quebec",R:"Romeo",S:"Sierra",T:"Tango",U:"Uniform",
    V:"Victor",W:"Whiskey",X:"X-ray",Y:"Yankee",Z:"Zulu",
    "0":"Zero","1":"One","2":"Two","3":"Three","4":"Four",
    "5":"Five","6":"Six","7":"Seven","8":"Eight","9":"Niner"
};
const LETTERS = Object.keys(NATO).filter(k => /[A-Z]/.test(k));
const DIGITS = Object.keys(NATO).filter(k => /[0-9]/.test(k));
const ALL_KEYS = [...LETTERS, ...DIGITS];

// IT-themed samples
const SAMPLES = [
    "SRV-DC01","192.168.1.254","PACS-IMG03","admin@maven","DR-BKUP07",
    "VLAN42","10.0.0.1","HL7-GW02","RIS-PRD01","HTTPS443","DICOM104",
    "FW-EDGE01","VMHost12","AD-SYNC05","NAS-VOL3","ESXi-NODE7",
    "172.16.0.50","SW-CORE02","AP-LOBBY3","WSUS-SRV01","SQL-PRD04",
    "VPN-GW01","DNS-SEC02","RADIUS01","LDAP-DC03","SCCM-PKG1",
    "CERT-CA01","GPO-SEC99","WLC-5520","VEEAM-BK2","STOR-LUN08"
];

function shuffle(a) {
    const b = [...a];
    for (let i = b.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [b[i], b[j]] = [b[j], b[i]];
    }
    return b;
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ═══════════════════════════════════════════════
// SOUND EFFECTS (Web Audio API)
// ═══════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playCorrect() {
    try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
}

function playWrong() {
    try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
}

function playTick() {
    try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.05);
    } catch(e) {}
}

function playComplete() {
    try {
        const ctx = getAudio();
        [0, 0.12, 0.24, 0.36].forEach((t, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime([523, 659, 784, 1047][i], ctx.currentTime + t);
            gain.gain.setValueAtTime(0.1, ctx.currentTime + t);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.2);
            osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.2);
        });
    } catch(e) {}
}

// ═══════════════════════════════════════════════
// TEXT-TO-SPEECH
// ═══════════════════════════════════════════════
function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9; u.pitch = 1;
    window.speechSynthesis.speak(u);
}

function speakerIcon() { return '🔊'; }

// ═══════════════════════════════════════════════
// PERSISTENT STATS (localStorage)
// ═══════════════════════════════════════════════
const STORE_KEY = 'nato_trainer_stats';
let stats = { sessions: 0, totalCorrect: 0, totalAttempts: 0, bestStreak: 0, bestTimedScore: 0 };

function loadStats() {
    try {
        const s = localStorage.getItem(STORE_KEY);
        if (s) stats = { ...stats, ...JSON.parse(s) };
    } catch(e) {}
    renderStats();
}

function saveStats() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(stats)); } catch(e) {}
    renderStats();
}

function renderStats() {
    document.getElementById('stat-sessions').textContent = stats.sessions;
    document.getElementById('stat-accuracy').textContent = stats.totalAttempts > 0 ? Math.round(stats.totalCorrect / stats.totalAttempts * 100) + '%' : '—';
    document.getElementById('stat-streak').textContent = stats.bestStreak;
    document.getElementById('stat-besttime').textContent = stats.bestTimedScore > 0 ? stats.bestTimedScore : '—';
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════
// TAB SYSTEM
// ═══════════════════════════════════════════════
let activeTab = 'convert';
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        const panel = document.getElementById('panel-' + activeTab);
        panel.classList.remove('hidden');
        panel.classList.add('fade-in');
        setTimeout(() => panel.classList.remove('fade-in'), 300);
    });
});

// ═══════════════════════════════════════════════
// 1. LIVE CONVERTER
// ═══════════════════════════════════════════════
(function initConvert() {
    const el = document.getElementById('panel-convert');
    el.innerHTML = `
        <div style="color:var(--text-dim);font-size:0.78rem;letter-spacing:0.1em;margin-bottom:14px">TYPE ANYTHING — SEE IT PHONETICALLY IN REAL TIME</div>
        <textarea class="input" id="conv-input" rows="2" placeholder="e.g. SRV-DC01 or admin@maven.com"></textarea>
        <div id="conv-output" class="mt-12"></div>
        <div id="conv-actions" class="mt-12 hidden flex-center gap-8">
            <button class="btn" id="conv-copy">COPY PHONETIC</button>
            <button class="speak-btn" id="conv-speak" title="Read aloud">${speakerIcon()}</button>
        </div>
    `;
    const input = document.getElementById('conv-input');
    const output = document.getElementById('conv-output');
    const actions = document.getElementById('conv-actions');

    input.addEventListener('input', () => {
        const text = input.value;
        if (!text) { output.innerHTML = ''; actions.classList.add('hidden'); return; }
        actions.classList.remove('hidden');
        const chars = text.toUpperCase().split('');
        let html = '<div class="convert-output">';
        chars.forEach(c => {
            if (c === ' ') { html += '<div class="convert-space"></div>'; }
            else if (NATO[c]) { html += `<span class="convert-pair"><span class="c-letter">${c}</span><span class="c-word">${NATO[c]}</span></span>`; }
            else { html += `<span style="color:var(--text-dimmer);font-size:0.95rem">${c}</span>`; }
        });
        html += '</div>';
        output.innerHTML = html;
    });

    document.getElementById('conv-copy').addEventListener('click', () => {
        const plain = input.value.toUpperCase().split('').filter(c => NATO[c]).map(c => NATO[c]).join(' ');
        navigator.clipboard?.writeText(plain).then(() => showToast('Copied: ' + plain));
    });

    document.getElementById('conv-speak').addEventListener('click', () => {
        const words = input.value.toUpperCase().split('').filter(c => NATO[c]).map(c => NATO[c]).join(', ');
        speak(words);
    });
})();

// ═══════════════════════════════════════════════

        } else if (state.mode === 'active') {
            const charsHtml = state.chars.map((c, i) => {
                const cls = i < state.idx ? 'done' : i === state.idx ? 'active' : 'pending';
                return `<span class="spell-char ${cls}">${c}</span>`;
            }).join('');

            el.innerHTML = `
                <div class="text-center" style="padding:15px 0">

                    <div style="color:var(--text-dim);font-size:0.78rem;letter-spacing:0.1em;margin-bottom:18px">CHARACTER ${state.idx + 1} OF ${state.chars.length}</div>
                    <div class="flex-center gap-12">
                        <input class="input" id="spell-input" placeholder="Type phonetic word..." style="width:240px;flex:none;text-align:center;font-size:1.05rem" autocomplete="off">
                        <button class="btn" id="spell-submit">SUBMIT</button>
                    </div>
                    <div style="color:var(--text-dimmest);font-size:0.68rem;margin-top:10px">Press Enter to submit</div>
                </div>
            `;
            const inp = document.getElementById('spell-input');
            setTimeout(() => inp.focus(), 50);
            inp.addEventListener('keydown', e => { if (e.key === 'Enter' && inp.value.trim()) submitSpell(); });
            document.getElementById('spell-submit').addEventListener('click', () => { if (inp.value.trim()) submitSpell(); });
        } else if (state.mode === 'results') {
            const score = state.results.filter(r => r.correct).length;
            const total = state.results.length;
            const pct = Math.round(score / total * 100);
            const color = pct === 100 ? 'var(--green)' : pct >= 70 ? 'var(--amber)' : 'var(--red)';
            const msg = pct === 100 ? 'PERFECT TRANSMISSION' : pct >= 70 ? 'GOOD COPY' : 'NEEDS PRACTICE';

            let rows = state.results.map(r => `
                <div class="result-row ${r.correct ? 'ok' : 'fail'}">
                    <span style="color:var(--green);font-weight:700;width:26px;text-align:center">${r.char}</span>
                    <span style="color:${r.correct ? 'var(--green)' : 'var(--red)'};flex:1">${r.given || '(empty)'}</span>
                    ${r.correct ? '' : `<span style="color:var(--text-dim)">→ ${r.expected}</span>`}
                    <span>${r.correct ? '✓' : '✗'}</span>
                </div>
            `).join('');

            el.innerHTML = `
                <div class="text-center mb-24">
                    <div style="font-size:2.4rem;font-weight:700;color:${color};text-shadow:0 0 20px ${color}44">${score}/${total}</div>
                    <div style="color:var(--text-dim);font-size:0.78rem;letter-spacing:0.1em">${msg}</div>
                </div>
                <div style="max-width:480px;margin:0 auto">${rows}</div>
                <div class="flex-center gap-12 mt-24">

                    <button class="btn btn-dim" id="spell-new">NEW</button>
                    <button class="speak-btn" id="spell-speak" title="Hear correct answer">${speakerIcon()}</button>
                </div>

            document.getElementById('spell-new').addEventListener('click', () => { state.mode = 'setup'; render(); });
            document.getElementById('spell-speak').addEventListener('click', () => {
                speak(state.chars.map(c => NATO[c]).join(', '));
            });
        }
    }

    function startSpell(text) {
        const upper = text.toUpperCase();
        const chars = upper.split('').filter(c => NATO[c]);
        state = { mode: 'active', challenge: upper, chars, answers: chars.map(c => NATO[c]), idx: 0, results: [] };
        stats.sessions++;
        saveStats();
        render();
    }

    function submitSpell() {
        const inp = document.getElementById('spell-input');
        const given = inp.value.trim();
        const expected = state.answers[state.idx];
        const correct = given.toLowerCase() === expected.toLowerCase();

        if (correct) playCorrect(); else playWrong();
        stats.totalAttempts++;
        if (correct) stats.totalCorrect++;
        saveStats();

        state.results.push({ char: state.chars[state.idx], expected, given, correct });
        state.idx++;
        if (state.idx >= state.chars.length) {
            state.mode = 'results';
            playComplete();
        }
        render();
    }

    render();
})();

(function initQuiz() {
    const el = document.getElementById('panel-quiz');
    let qState = { running: false, type: null, current: null, options: [], selected: null, score: 0, total: 0, streak: 0, best: 0 };

    function render() {
        if (!qState.running) {
            el.innerHTML = `
                <div class="text-center" style="padding:40px 0">
                    <div style="color:var(--text-dim);font-size:0.82rem;letter-spacing:0.1em;margin-bottom:24px">CHOOSE QUIZ TYPE</div>

                            <div style="letter-spacing:0.1em">LETTER → WORD</div>
                            <div style="color:var(--text-dim);font-size:0.7rem;margin-top:4px">See "A", pick "Alpha"</div>
                        </button>
                        <button class="btn btn-amber" id="quiz-word" style="padding:18px 28px">
                            <div style="font-size:1.3rem;margin-bottom:6px">Alpha</div>
                            <div style="letter-spacing:0.1em">WORD → LETTER</div>
                            <div style="color:var(--text-dim);font-size:0.7rem;margin-top:4px">See "Alpha", pick "A"</div>
                        </button>
                    </div>
                    <div style="color:var(--text-dimmest);font-size:0.68rem;margin-top:20px">Use keys <span class="kbd">1</span><span class="kbd">2</span><span class="kbd">3</span><span class="kbd">4</span> to answer</div>
                </div>
            `;
            document.getElementById('quiz-letter').addEventListener('click', () => startQuiz('letter'));
            document.getElementById('quiz-word').addEventListener('click', () => startQuiz('word'));
            return;
        }

        const optsHtml = qState.options.map((o, i) => {
            let cls = '';
            if (qState.selected !== null) {
                const isAnswer = qState.type === 'word' ? NATO[o] === qState.current : o === NATO[qState.current];
                if (isAnswer) cls = 'correct';
                else if (o === qState.selected) cls = 'wrong';
                else cls = 'dimmed';
            }
            return `<button class="quiz-opt ${cls}" data-opt="${o}" data-idx="${i}"><span class="kbd" style="margin-right:6px">${i+1}</span> ${o}</button>`;
        }).join('');

        const displaySize = qState.type === 'word' ? '1.8rem' : '3.5rem';
        el.innerHTML = `
            <div class="flex-center gap-12 mb-24" style="gap:28px">
                <div class="text-center"><div class="stat-label">SCORE</div><div class="stat-val" style="color:var(--green)">${qState.score}/${qState.total}</div></div>
                <div class="text-center"><div class="stat-label">STREAK</div><div class="stat-val" style="color:var(--amber)">${qState.streak}</div></div>
                <div class="text-center"><div class="stat-label">BEST</div><div class="stat-val" style="color:var(--red)">${qState.best}</div></div>
            </div>
            <div class="text-center" style="font-size:${displaySize};font-weight:700;color:var(--green);text-shadow:0 0 30px var(--green-glow);min-height:70px;display:flex;align-items:center;justify-content:center;margin-bottom:24px">${qState.current}</div>
            <div class="quiz-grid">${optsHtml}</div>
            <div class="flex-center mt-24">
                <button class="btn btn-dim" id="quiz-back">BACK</button>
            </div>
        `;

        el.querySelectorAll('.quiz-opt').forEach(b => b.addEventListener('click', () => handleQuizPick(b.dataset.opt)));
        document.getElementById('quiz-back').addEventListener('click', () => { qState.running = false; render(); });
    }

    function startQuiz(type) {
        qState = { running: true, type, current: null, options: [], selected: null, score: 0, total: 0, streak: 0, best: 0 };
        stats.sessions++;
        saveStats();
        nextQuestion();
    }

    function nextQuestion() {
        const key = pickRandom(ALL_KEYS);
        const correct = NATO[key];
        if (qState.type === 'word') {
            qState.current = correct;
            qState.options = shuffle([key, ...shuffle(ALL_KEYS.filter(k => k !== key)).slice(0, 3)]);
        } else {
            qState.current = key;
            const wrongs = shuffle(Object.values(NATO).filter(v => v !== correct)).slice(0, 3);
            qState.options = shuffle([correct, ...wrongs]);
        }
        qState.selected = null;
        render();
    }

    function handleQuizPick(opt) {
        if (qState.selected !== null) return;
        qState.selected = opt;
        const isCorrect = qState.type === 'word' ? NATO[opt] === qState.current : opt === NATO[qState.current];

        if (isCorrect) { playCorrect(); qState.score++; qState.streak++; qState.best = Math.max(qState.best, qState.streak); }
        else { playWrong(); qState.streak = 0; }
        qState.total++;

        stats.totalAttempts++;
        if (isCorrect) stats.totalCorrect++;
        if (qState.best > stats.bestStreak) stats.bestStreak = qState.best;
        saveStats();

        render();
        setTimeout(nextQuestion, isCorrect ? 400 : 1100);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (activeTab !== 'quiz' || !qState.running || qState.selected !== null) return;
        const idx = parseInt(e.key) - 1;
        if (idx >= 0 && idx < qState.options.length) {
            handleQuizPick(qState.options[idx]);
        }
    });

    render();
})();

        }).join('');

        el.innerHTML = `
            <div class="flex-center gap-12 mb-20" style="gap:28px">
                <div class="text-center"><div class="stat-label">TIME</div><div class="sim-timer" style="color:${timerColor};text-shadow:0 0 20px ${timerColor}44;margin:0">${tState.timeLeft}</div></div>
                <div class="text-center"><div class="stat-label">SCORE</div><div class="sim-timer" style="color:var(--green);text-shadow:0 0 20px var(--green-glow);margin:0">${tState.score}</div></div>
            </div>
            <div style="width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:20px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:${timerColor};transition:width 1s linear;border-radius:2px"></div>
            </div>
            <div class="text-center" style="font-size:4rem;font-weight:700;color:var(--green);text-shadow:0 0 40px var(--green-glow);min-height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:24px">${tState.current}</div>
            <div class="quiz-grid">${optsHtml}</div>
        `;

        el.querySelectorAll('[data-topt]').forEach(b => b.addEventListener('click', () => handleTimedPick(b.dataset.topt)));
    }

    function startTimed() {
        tState = { running: true, timeLeft: tState.duration, score: 0, current: null, options: [], selected: null, timer: null, duration: tState.duration };
        stats.sessions++;
        saveStats();
        nextTimedQ();
        tState.timer = setInterval(() => {
            tState.timeLeft--;
            if (tState.timeLeft <= 10) playTick();
            render();
        }, 1000);
    }

    function nextTimedQ() {
        const key = pickRandom(ALL_KEYS);
        const correct = NATO[key];
        const wrongs = shuffle(Object.values(NATO).filter(v => v !== correct)).slice(0, 3);
        tState.current = key;
        tState.options = shuffle([correct, ...wrongs]);
        tState.selected = null;
        render();
    }

    function handleTimedPick(opt) {
        if (tState.selected !== null || tState.timeLeft <= 0) return;
        tState.selected = opt;
        const isCorrect = opt === NATO[tState.current];

        if (isCorrect) { playCorrect(); tState.score++; }
        else { playWrong(); }

        stats.totalAttempts++;
        if (isCorrect) stats.totalCorrect++;
        saveStats();

        render();
        setTimeout(nextTimedQ, isCorrect ? 300 : 800);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (activeTab !== 'timed' || !tState.running || tState.selected !== null || tState.timeLeft <= 0) return;
        const idx = parseInt(e.key) - 1;
        if (idx >= 0 && idx < tState.options.length) {
            handleTimedPick(tState.options[idx]);
        }
    });

    render();
})();

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
loadStats();
</script>
</body>
